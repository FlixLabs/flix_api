services:
  api:
    build: .
    restart: unless-stopped
    ports:
      - ${API_PORT}:3000
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - .:/api
      - /api/node_modules
    depends_on:
      - redis

  redis:
    image: redis/redis-stack-server:latest
    restart: unless-stopped
    command: >
      redis-server
      --save 20 1
      --loglevel warning
      --requirepass ${REDIS_PASSWORD}
      --loadmodule /opt/redis-stack/lib/rejson.so
    ports:
      - ${REDIS_PORT}:6379
    volumes:
      - ./redis:/data
